on:
  push:
    paths:
      - '.github/workflows/build-iso.yml'
  workflow_dispatch:

env:
  IMAGE_REGISTRY: ghcr.io/${{ github.repository_owner }}

name: Release ISO
jobs:
  release-iso:
    name: Generate and Release ISOs
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write

    strategy:
      fail-fast: false
      matrix:
        image_name: 
          - kandari
          - kandari-nvidia
        major_version:
          - 40
        image_tag:
          - latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Determine variant
        id: var
        run: |
          VARIANT="Kinoite"
          echo "variant=${VARIANT}" >> $GITHUB_ENV

      - name: Generate ISO  
        uses: jasonn3/build-container-installer@main
        id: build
        with:
          arch: x86_64
          image_name: ${{ matrix.image_name }}
          image_repo: ${{ env.IMAGE_REGISTRY }}
          variant: ${{ env.variant }}
          version: ${{ matrix.major_version }}
          image_tag: ${{ matrix.image_tag }}
          iso_name: ${{ matrix.image_name }}-${{ matrix.image_tag }}.iso
          web_ui: false
          enable_cache_dnf: "false"
          enable_cache_skopeo: "false"

      - name: Upload ISO + Checksum
        uses: actions/upload-artifact@v3
        with:
          name: ${{ steps.build.outputs.iso_name }}
          path: |
            ${{ steps.build.outputs.iso_path }}
            ${{ steps.build.outputs.iso_path }}-CHECKSUM
          if-no-files-found: error
          retention-days: 1  # Change retention as needed

      - name: Generate Unique Tag
        id: tag
        run: |
          TAG_NAME=$(date +'%Y%m%d')
          echo "tag_name=${TAG_NAME}" >> $GITHUB_ENV

      - name: Create GitHub Release and Upload ISO + Checksum
        id: upload-github-release
        shell: bash
        env:
          LIMIT_MB: '2000'
          GITHUB_TOKEN: ${{ secrets.kandari_release_iso_token }}
        run: |
          if [ -z "${{ env.tag_name }}" ]; then 
            echo "## no release tag given"
            exit 0
          fi
          echo "## github upload"

          echo ${{ secrets.kandari_release_iso_token }} | gh auth login --with-token
          gh release create ${{ env.tag_name }} --title ${{ env.tag_name }} --repo ${{ github.repository }} --notes "automated release" || echo "release already exists"

          GITHUB_LINK=https://github.com/${GITHUB_REPOSITORY}/releases/download/${{ env.tag_name }}

          if [[ -z "$(du --threshold=${LIMIT_MB}M ${{ steps.build.outputs.iso_path }})" ]]; then
            # iso is small enough to upload already
            gh release upload ${{ env.tag_name }} --repo ${{ github.repository }} --clobber \
              ${{ steps.build.outputs.iso_path }} ${{ steps.build.outputs.iso_path }}-CHECKSUM
          else
            # iso is too big - creating a split-zip
            zip -j -s ${LIMIT_MB}m ${{ steps.build.outputs.iso_path }}.zip ${{ steps.build.outputs.iso_path }}
            
            REMOTE_FILES=$(find . -maxdepth 1 -name "*.z*" -exec basename {} \; | xargs -I{} echo "-w \"${GITHUB_LINK}/{}\"")
            gh release upload ${{ env.tag_name }} --repo ${{ github.repository }} --clobber \
              ./${{ steps.build.outputs.iso_path }}+(.z*|.sha*|.pkgs|.sig|.torrent)
            
            # Upload Checksum
            gh release upload ${{ env.tag_name }} --repo ${{ github.repository }} --clobber \
              ${{ steps.build.outputs.iso_path }}-CHECKSUM
          fi
