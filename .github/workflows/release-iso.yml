name: Release ISO

on:
  push:
    paths:
      - '.github/workflows/release-iso.yml'
  workflow_dispatch:

env:
  IMAGE_REGISTRY: ghcr.io/${{ github.repository_owner }}

jobs:
  release-iso:
    name: Generate and Release ISOs
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write

    strategy:
      fail-fast: false
      matrix:
        image_name:
          - kandari
          - kandari-nvidia
        major_version:
          - 40
        image_tag:
          - latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Determine variant
        id: var
        run: |
          VARIANT="Kinoite"
          echo "variant=${VARIANT}" >> $GITHUB_ENV

      - name: Generate ISO  
        uses: jasonn3/build-container-installer@main
        id: build
        with:
          arch: x86_64
          image_name: ${{ matrix.image_name }}
          image_repo: ${{ env.IMAGE_REGISTRY }}
          variant: ${{ env.variant }}
          version: ${{ matrix.major_version }}
          image_tag: ${{ matrix.image_tag }}
          iso_name: ${{ matrix.image_name }}-${{ matrix.image_tag }}.iso
          web_ui: false
          enable_cache_dnf: "false"
          enable_cache_skopeo: "false"

      - name: Upload ISO + Checksum to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.build.outputs.iso_name }}
          path: |
            ${{ steps.build.outputs.iso_path }}
            ${{ steps.build.outputs.iso_path }}-CHECKSUM
          if-no-files-found: error
          retention-days: 1

      - name: Upload ISO to SourceForge
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SOURCEFORGE_SSH_PRIVATE_KEY }}
          SSH_PUBLIC_KEY: ${{ secrets.SOURCEFORGE_SSH_PUBLIC_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SOURCEFORGE_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          echo "${{ secrets.SOURCEFORGE_SSH_PUBLIC_KEY }}" > ~/.ssh/id_rsa.pub
          chmod 600 ~/.ssh/id_rsa
          chmod 644 ~/.ssh/id_rsa.pub
          rsync -avz -e "ssh -o StrictHostKeyChecking=no" \
            ${{ steps.build.outputs.iso_path }} \
            ${{ steps.build.outputs.iso_path }}-CHECKSUM \
            ${{ secrets.SOURCEFORGE_USERNAME }}@web.sourceforge.net:/home/frs/project/${{ secrets.SOURCEFORGE_PROJECT_NAME }}

      - name: Clean up SSH keys
        run: |
          rm -rf ~/.ssh
